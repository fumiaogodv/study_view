<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>我的学习空间</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<style>
    /* 定义有记录日期的样式：带一个绿色的小圆点 */
    .has-record {
        background: rgba(76, 175, 80, 0.3) !important;
        border-radius: 50% !important;
        font-weight: bold;
    }
</style>

</head>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<body>

    <button class="toggle-btn" id="btn-calendar-toggle" onclick="togglePanel('calendar-panel')">📅</button>

<div class="glass-panel history-section" id="calendar-panel">
    <h3 style="margin-top:0">学习历史</h3>
    <input type="text" id="calendarPicker"> </div>

   <div id="bg-container">
    <video id="bg-video" autoplay muted loop playsinline>
        <source id="video-source" src="/static/videos/nature.mp4" type="video/mp4">
    </video>
</div>

<button class="toggle-btn" id="btn-next-bg" onclick="nextBackground()" style="bottom: 20px; left: 20px;" title="切换背景">🖼️</button>

    <button class="toggle-btn" id="btn-timer-toggle" onclick="togglePanel('timer-panel')">⏱️</button>
    <button class="toggle-btn" id="btn-task-toggle" onclick="togglePanel('task-panel')">📝</button>

    <div class="glass-panel timer-section" id="timer-panel">
        <h2>专注时钟</h2>
        <div class="timer-display" id="display">00:00</div>

        <select id="taskName" style="width: 100%; box-sizing: border-box; margin-top: 10px; padding: 12px; border-radius: 8px; border: none; background: #000000; color: white; outline: none;">
        <option value="高等数学">高等数学</option>
        <option value="英语学习">英语学习</option>
        <option value="编程练习">编程练习</option>
        <option value="阅读书籍">阅读书籍</option>
        <option value="new">+ 添加新任务</option>
    </select>
        <textarea id="note" placeholder="备注 (可选)"></textarea>

        <button class="action-btn" onclick="handleTimerClick()" id="startBtn">开始学习</button>
    </div>

    <button class="toggle-btn" id="btn-music-toggle" onclick="togglePanel('music-panel')" style="bottom: 20px; right: 80px;">🎵</button>

<div class="glass-panel music-section" id="music-panel">
    <div class="player-container">
        <div class="current-info">
            <img src="static/cover/default.png" class="album-cover" id="music-cover">
            <div class="song-details">
                <h4 id="song-title">等待播放...</h4>
                <p id="song-artist">本地音乐</p>
            </div>
        </div>

        <div class="progress-area">
            <input type="range" id="progress" value="0" max="100">
            <div class="time-stamp">
                <span id="current-time">00:00</span>
                <span id="total-time">00:00</span>
            </div>
        </div>

        <div class="player-controls">
    <button onclick="togglePlayMode()" id="play-mode-btn" title="顺序播放">🔁</button>
    <button onclick="prevMusic()">⏮</button>
    <button onclick="togglePlay()" id="play-pause">▶</button>
    <button onclick="nextMusic()">⏭</button>

    <div class="volume-group">
        <button id="mute-btn" style="font-size: 1.2em;">🔊</button>
        <div class="volume-slider-container">
            <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.8">
        </div>
    </div>
</div>

        <div class="player-controls">
            </div>

        <div class="music-list record-container"  id="music-list-container" >
            </div>
    </div>
</div>

    </div>
</div>

<audio id="main-audio" src=""></audio>


<div class="glass-panel task-detail-section" id="task-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 0 5px;">
        <h3 style="margin: 0; display: flex; align-items: center; gap: 8px;">
            <span>📊</span> 任务明细
        </h3>

        <button onclick="handleManualAdd()" class="add-btn-new">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
            </svg>
        </button>
    </div>

    <!-- 总时长显示区域 -->
    <div id="totalDurationDisplay" class="total-duration-container record-item" style="
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
        padding: 12px 15px;
        font-weight: bold;
    ">
        <span style="display: flex; align-items: center; gap: 8px;">
            <span style="font-size: 1.2em;">⏱️</span>
            <span>今日总时长</span>
        </span>
        <span id="totalDurationValue" style="color:#4CAF50; font-size: 1.2em;">0min</span>
    </div>

    <div id="recordList" class="record-container">
        </div>
</div>

    <script src="/static/js/index.js"></script>

<button class="toggle-btn" id="btn-fullscreen" onclick="toggleFullScreen()" style="top: 20px; right: 80px;" title="全屏模式">
    ⛶
</button>

</body>
</html>
