<!DOCTYPE html>
<html lang="zh" class="statistics-root">
<head>
    <meta charset="UTF-8">
    <title>学习数据统计</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* 平板一屏：占满视口高度、禁止整页滚动 */
        html.statistics-root,
        body.statistics-body {
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        html.statistics-root {
            height: 100dvh;
        }

        body.statistics-body {
            min-height: 100dvh;
            max-height: 100dvh;
        }

        .statistics-page {
            position: relative;
            z-index: 1;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 1200px;
            height: 100dvh;
            max-height: 100dvh;
            margin: 0 auto;
            padding: max(4px, env(safe-area-inset-top, 0px)) max(10px, env(safe-area-inset-right, 0px))
                max(6px, env(safe-area-inset-bottom, 0px)) max(10px, env(safe-area-inset-left, 0px));
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 0;
            box-shadow: none;
            color: #fff;
            overflow: hidden;
        }

        @media (min-width: 900px) {
            .statistics-page {
                width: 96%;
                margin-top: 4px;
                border-radius: 14px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.28);
            }
        }

        .statistics-page header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            gap: 8px;
            margin-bottom: 6px;
            padding-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .statistics-page h1 {
            margin: 0;
            font-weight: 500;
            font-size: 1.05rem;
            letter-spacing: 0.3px;
        }

        .back-btn {
            background: rgba(76, 175, 80, 0.85);
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: rgba(76, 175, 80, 1);
        }

        .filters {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 8px 10px;
            background: rgba(0, 0, 0, 0.22);
            border-radius: 10px;
            margin-bottom: 6px;
            flex-shrink: 0;
        }

        .filters label {
            font-weight: 600;
            font-size: 0.72rem;
            opacity: 0.95;
        }

        .filters input[type="date"],
        .filters button,
        .filters select {
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 255, 255, 0.28);
            color: #fff;
            padding: 5px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
        }

        .filters input[type="date"] {
            max-width: 118px;
        }

        .filters select {
            min-width: 0;
            max-width: 140px;
        }

        .filters select option {
            background: #1e1e1e;
            color: #fff;
        }

        .filters button {
            cursor: pointer;
        }

        .filters button:hover {
            background: rgba(76, 175, 80, 0.35);
            border-color: rgba(76, 175, 80, 0.5);
        }

        .quick-range {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-left: auto;
        }

        .granularity-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
        }

        .granularity-btns .gran-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.22);
            color: #fff;
            padding: 4px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.72rem;
        }

        .granularity-btns .gran-btn.active {
            background: rgba(76, 175, 80, 0.55);
            border-color: rgba(129, 199, 132, 0.7);
        }

        .filter-details {
            margin: 0;
            font-size: 0.68rem;
            opacity: 0.78;
            line-height: 1.35;
        }

        .filter-details summary {
            cursor: pointer;
            user-select: none;
            list-style: none;
            font-weight: 600;
            opacity: 0.9;
        }

        .filter-details summary::-webkit-details-marker {
            display: none;
        }

        .filter-details[open] summary {
            margin-bottom: 4px;
        }

        /* 图表区：占满剩余高度，左右并排（平板） */
        .charts-grid {
            flex: 1 1 0;
            min-height: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            align-items: stretch;
        }

        .chart-block {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            padding: 6px 8px 8px;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 0;
            min-width: 0;
        }

        .chart-block h2 {
            margin: 0 0 2px;
            font-size: 0.78rem;
            font-weight: 600;
            color: #a5d6a7;
            flex-shrink: 0;
        }

        .chart-block p.sub {
            margin: 0 0 4px;
            font-size: 0.65rem;
            opacity: 0.75;
            line-height: 1.25;
            flex-shrink: 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .chart-wrap {
            position: relative;
            flex: 1 1 0;
            min-height: 120px;
            height: 100%;
            width: 100%;
        }

        .loading-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.8rem;
            pointer-events: none;
        }

        .filters .row-dates {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px 8px;
        }

        .filters .row-controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px 8px;
            padding-top: 4px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 窄屏手机：允许滚动、图表上下叠放（平板宽度仍并排） */
        @media (max-width: 600px) {
            body.statistics-body {
                overflow: auto;
                max-height: none;
            }

            .statistics-page {
                height: auto;
                min-height: 100dvh;
                max-height: none;
                overflow: visible;
                padding-bottom: 16px;
            }

            .charts-grid {
                grid-template-columns: 1fr;
                flex: none;
            }

            .chart-wrap {
                height: 220px;
                flex: none;
            }

            .quick-range {
                margin-left: 0;
                width: 100%;
            }
        }
    </style>
</head>
<body class="statistics-body">
    <div id="bg-container">
        <video id="bg-video" autoplay muted loop playsinline>
            <source src="/static/videos/nature.mp4" type="video/mp4">
        </video>
    </div>

    <div class="statistics-page">
        <header>
            <h1>学习数据统计</h1>
            <a href="/" class="back-btn">返回首页</a>
        </header>

        <div class="filters">
            <div class="row-dates">
                <label>从</label>
                <input type="date" id="startDate">
                <label>到</label>
                <input type="date" id="endDate">
                <button type="button" id="btnApply">应用</button>
                <div class="quick-range">
                    <button type="button" class="quick" data-days="7">7天</button>
                    <button type="button" class="quick" data-days="30">30天</button>
                    <button type="button" class="quick" data-days="90">90天</button>
                </div>
            </div>
            <div class="row-controls">
                <label>粒度</label>
                <div class="granularity-btns" id="granularityBtns">
                    <button type="button" class="gran-btn active" data-granularity="day">按天</button>
                    <button type="button" class="gran-btn" data-granularity="week">按周</button>
                    <button type="button" class="gran-btn" data-granularity="month">按月</button>
                </div>
                <label for="subjectSelect">科目</label>
                <select id="subjectSelect">
                    <option value="">全部</option>
                </select>
            </div>
            <details class="filter-details">
                <summary>使用说明</summary>
                折线与饼图共用日期范围与粒度；切换后两图一起刷新。折线可选全部或单科。饼图为区间内各科总时长占比。
            </details>
        </div>

        <div class="charts-grid">
            <section class="chart-block">
                <h2>趋势（折线）</h2>
                <p class="sub" id="lineSub">横轴：时间 · 纵轴：小时</p>
                <div class="chart-wrap">
                    <canvas id="chartLine"></canvas>
                    <div class="loading-overlay" id="loadLine">加载中…</div>
                </div>
            </section>
            <section class="chart-block">
                <h2>占比（饼图）</h2>
                <p class="sub" id="pieSub">各科总时长占比</p>
                <div class="chart-wrap">
                    <canvas id="chartPie"></canvas>
                    <div class="loading-overlay" id="loadPie">加载中…</div>
                </div>
            </section>
        </div>
    </div>

    <script src="/static/js/statistics.js"></script>
</body>
</html>
