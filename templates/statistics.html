<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>学习数据统计</title>
    <link rel="stylesheet" href="/static/css/index.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .statistics-container {
            position: relative;
            width: 90%;
            max-width: 1200px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            color: white;
        }

        .statistics-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .statistics-header h1 {
            margin: 0;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .back-btn {
            background: rgba(76, 175, 80, 0.8);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover {
            background: rgba(76, 175, 80, 1);
            transform: translateY(-2px);
        }

        .controls-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
        }

        .control-group {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .control-group label {
            font-weight: bold;
            min-width: 80px;
        }

        select, input, button {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.9em;
            outline: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        select option {
            background-color: #222;
            color: white;
        }

        .chart-open-bar {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 16px 20px;
            margin-bottom: 24px;
        }

        .chart-open-hint {
            margin: 0 0 12px 0;
            font-size: 0.9em;
            opacity: 0.85;
        }

        .chart-open-btn {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: white;
            padding: 12px 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.95em;
        }

        .chart-open-btn:hover {
            background: rgba(76, 175, 80, 0.35);
            border-color: rgba(76, 175, 80, 0.6);
        }

        .chart-modal {
            position: fixed;
            inset: 0;
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
            box-sizing: border-box;
        }

        .chart-modal.open {
            display: flex;
        }

        .chart-modal-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(4px);
        }

        .chart-modal-panel {
            position: relative;
            width: min(920px, 100%);
            max-height: min(88vh, 900px);
            background: rgba(28, 32, 36, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chart-modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
            flex-shrink: 0;
        }

        .chart-modal-head h3 {
            margin: 0;
            font-size: 1.1em;
            font-weight: 500;
            color: #81c784;
        }

        .chart-modal-close {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.85);
            font-size: 1.75rem;
            line-height: 1;
            cursor: pointer;
            padding: 4px 10px;
            border-radius: 8px;
        }

        .chart-modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .chart-modal-body {
            padding: 16px 18px 20px;
            overflow: auto;
            flex: 1;
            min-height: 0;
        }

        .modal-chart-panel {
            display: none;
            position: relative;
            min-height: 280px;
        }

        .modal-chart-panel.active {
            display: block;
        }

        .modal-chart-panel .chart-wrapper {
            height: min(52vh, 420px);
        }

        .modal-chart-panel#modalPanelList .subject-list {
            max-height: min(60vh, 520px);
            overflow-y: auto;
        }

        .chart-title {
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.2em;
            color: #4CAF50;
        }

        .chart-wrapper {
            position: relative;
            height: 400px;
            width: 100%;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2em;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 20px;
        }

        .stat-card h3 {
            margin-top: 0;
            color: #4CAF50;
            font-size: 1.1em;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin: 10px 0;
        }

        .stat-desc {
            font-size: 0.9em;
            opacity: 0.8;
        }

        .subject-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .subject-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .subject-item:last-child {
            border-bottom: none;
        }

        .subject-name {
            flex-grow: 1;
        }

        .subject-duration {
            color: #4CAF50;
            font-weight: bold;
        }

        .subject-percentage {
            opacity: 0.7;
            font-size: 0.9em;
            margin-left: 10px;
        }

        .time-period-selector {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .period-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .period-btn.active {
            background: rgba(76, 175, 80, 0.8);
            border-color: rgba(76, 175, 80, 0.5);
        }

        .period-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .date-range-selector {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .date-input {
            width: 150px;
        }

        .apply-btn {
            background: rgba(76, 175, 80, 0.8);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .apply-btn:hover {
            background: rgba(76, 175, 80, 1);
            transform: translateY(-2px);
        }

        .chart-selector {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 0;
        }

        .quick-date-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px;
        }

        .quick-date-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.8em;
        }

        .quick-date-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        @media (max-width: 768px) {
            .statistics-container {
                width: 95%;
                padding: 20px;
                margin: 20px auto;
            }
            
            .control-group {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .chart-wrapper {
                height: 300px;
            }
            
            .stats-grid {
                grid-template-columns: 1fr;
            }
            
            .date-range-selector {
                flex-direction: column;
                align-items: flex-start;
            }
            
            .date-input {
                width: 100%;
            }
            
            .chart-selector {
                justify-content: center;
            }
            
            .chart-open-btn {
                flex: 1;
                min-width: 140px;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .statistics-container {
                padding: 15px;
            }
            
            .chart-wrapper {
                height: 250px;
            }
            
            .chart-open-btn {
                min-width: 120px;
                padding: 10px 12px;
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <div id="bg-container">
        <video id="bg-video" autoplay muted loop playsinline>
            <source id="video-source" src="/static/videos/nature.mp4" type="video/mp4">
        </video>
    </div>

    <div class="statistics-container">
        <div class="statistics-header">
            <h1>📊 学习数据统计</h1>
            <a href="/" class="back-btn">返回首页</a>
        </div>

        <div class="controls-section">
            <div class="control-group">
                <label>日期范围：</label>
                <div class="date-range-selector">
                    <input type="date" id="startDate" class="date-input">
                    <span>至</span>
                    <input type="date" id="endDate" class="date-input">
                    <button id="applyDateRange" class="apply-btn">应用</button>
                </div>
                <div class="quick-date-buttons">
                    <button class="quick-date-btn" data-days="7">最近7天</button>
                    <button class="quick-date-btn" data-days="30">最近30天</button>
                    <button class="quick-date-btn" data-days="90">最近90天</button>
                    <button class="quick-date-btn" data-days="365">最近1年</button>
                </div>
            </div>
            
            <div class="control-group">
                <label>时间粒度：</label>
                <div class="time-period-selector">
                    <button type="button" class="period-btn active" data-period="weekday" title="将所选日期范围内所有记录按周一～周日汇总">按星期</button>
                    <button type="button" class="period-btn" data-period="month" title="按自然月汇总">按月</button>
                    <button type="button" class="period-btn" data-period="day" title="按日历天">按日</button>
                </div>
            </div>
            
            <div class="control-group">
                <label>科目：</label>
                <select id="subjectSelect">
                    <option value="">全部科目（默认）</option>
                </select>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>📈 总学习时长</h3>
                <div class="stat-value" id="totalDuration">0 小时</div>
                <div class="stat-desc">所选时间段内的总学习时间</div>
            </div>
            
            <div class="stat-card">
                <h3>📚 学习科目数</h3>
                <div class="stat-value" id="subjectCount">0</div>
                <div class="stat-desc">不同科目的数量</div>
            </div>
            
            <div class="stat-card">
                <h3>📅 学习天数</h3>
                <div class="stat-value" id="studyDays">0</div>
                <div class="stat-desc">有学习记录的天数</div>
            </div>
            
            <div class="stat-card">
                <h3>⏱️ 日均时长</h3>
                <div class="stat-value" id="avgDailyDuration">0 小时</div>
                <div class="stat-desc">平均每天学习时间</div>
            </div>
        </div>

        <div class="chart-open-bar">
            <p class="chart-open-hint">图表在弹窗中展示，页面更紧凑；修改上方日期、时间粒度或科目后，以下各图会一起更新。</p>
            <div class="chart-selector">
                <button type="button" class="chart-open-btn" data-open-chart="period">📊 学习时长</button>
                <button type="button" class="chart-open-btn" data-open-chart="subject">📚 科目分布</button>
                <button type="button" class="chart-open-btn" data-open-chart="trend">📈 科目按日</button>
                <button type="button" class="chart-open-btn" data-open-chart="list">📋 明细列表</button>
            </div>
        </div>

        <div id="chartModal" class="chart-modal" aria-hidden="true">
            <div class="chart-modal-backdrop" id="chartModalBackdrop"></div>
            <div class="chart-modal-panel" role="dialog" aria-modal="true" aria-labelledby="chartModalTitle">
                <div class="chart-modal-head">
                    <h3 id="chartModalTitle">图表</h3>
                    <button type="button" class="chart-modal-close" id="chartModalClose" aria-label="关闭">&times;</button>
                </div>
                <div class="chart-modal-body">
                    <div id="modalPanelPeriod" class="modal-chart-panel">
                        <div class="chart-wrapper">
                            <canvas id="periodChart"></canvas>
                            <div class="loading" id="periodLoading">加载中...</div>
                        </div>
                    </div>
                    <div id="modalPanelSubject" class="modal-chart-panel">
                        <div class="chart-wrapper">
                            <canvas id="subjectChart"></canvas>
                            <div class="loading" id="subjectLoading">加载中...</div>
                        </div>
                    </div>
                    <div id="modalPanelTrend" class="modal-chart-panel">
                        <div class="chart-wrapper">
                            <canvas id="subjectTrendChart"></canvas>
                            <div class="loading" id="trendLoading">请选择科目后查看按日曲线</div>
                        </div>
                    </div>
                    <div id="modalPanelList" class="modal-chart-panel">
                        <div class="subject-list" id="subjectList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/statistics.js"></script>
</body>
</html>
